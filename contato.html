<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Ícaro Coelho - Contato</title>
</head>

<body class="body-contato">

    <nav class="navbar">

        <div class="logo">Ícaro Coelho</div>

        <ul class="menu">
            <li><a href="index.html">Início</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="portifolio.html">Portfólio</a></li>
            <li><a href="novidades.html">Novidades</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>

        <label class="switch">

            <input type="checkbox" id="toggleMode">
            <span class="slider">

                <i class="bi bi-moon icon moon"></i>
                <i class="bi bi-sun icon sun"></i>

            </span>

        </label>

        <script src="script.js"></script>

    </nav>

    <div class="linha-degrade"></div>

    <div class="container-form aparecer">
        <h2 class="text-form">Entre em contato</h2>

        <div class="linha">
            <div class="campo">
                <label for="nome">Nome</label>
                <input id="nome" type="text" placeholder="Seu nome" />
            </div>
            <div class="campo">
                <label for="telefone">Telefone</label>
                <input id="telefone" type="tel" placeholder="Seu telefone" />
            </div>
        </div>

        <div class="campo-grande">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Seu@email.com" />
        </div>

        <div class="campo-grande">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" placeholder="Escreva sua mensagem aqui..."></textarea>
        </div>

        <button type="button">Enviar Mensagem</button>
    </div>

</body>

<footer class="footer">Desenvolvido por @Ícaro Coelho</footer>

</html>
