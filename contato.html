<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Ícaro Coelho - Contato</title>
</head>

<body class="body-contato">

    <nav class="navbar">

        <div class="logo">Ícaro Coelho</div>

        <ul class="menu">
            <li><a href="index.html">Início</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="portifolio.html">Portfólio</a></li>
            <li><a href="novidades.html">Novidades</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>

        <label class="switch">

            <input type="checkbox" id="toggleMode">
            <span class="slider">

                <i class="bi bi-moon icon moon"></i>
                <i class="bi bi-sun icon sun"></i>

            </span>

        </label>

        <script src="script.js"></script>

    </nav>

    <div class="linha-degrade"></div>

    <div class="container-form aparecer">
        <h2 class="text-form">Entre em contato</h2>

        <div class="linha">
            <div class="campo">
                <label for="nome">Nome</label>
                <input id="nome" type="text" placeholder="Seu nome" />
            </div>
            <div class="campo">
                <label for="telefone">Telefone</label>
                <input id="telefone" type="tel" placeholder="Seu telefone" />
            </div>
        </div>

        <div class="campo-grande">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Seu@email.com" />
        </div>

        <div class="campo-grande">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" placeholder="Escreva sua mensagem aqui..."></textarea>
        </div>

        <button type="button">Enviar Mensagem</button>
    </div>

    <div class="container-redes">

        <button class="btt-wpp aparecer" onclick='window.open("https://wa.me/seunumero", "_blank")'>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">

                    d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"
                    fill="currentColor" />
                <path
                    d="M12 2C6.477 2 2 6.477 2 12c0 1.82.487 3.53 1.338 5.003L2 22l5.09-1.323A9.956 9.956 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a7.95 7.95 0 01-4.083-1.125l-.293-.174-3.02.785.804-2.938-.191-.302A7.95 7.95 0 014 12c0-4.418 3.582-8 8-8s8 3.582 8 8-3.582 8-8 8z"
                    fill="currentColor" />
            </svg>
            WhatsApp
        </button>


        <button class="btt-instagram aparecer" onclick='window.open("https://instagram.com/indotrem", "_blank")'>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="currentColor" stroke-width="1.8" />
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8" />
                <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" />
            </svg>
            Instagram
        </button>

        <button class="btt-email aparecer" onclick="window.location.href='mailto:icarocoelhosilva2006@gmail.com'">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                <rect x="2" y="4" width="20" height="16" rx="3" stroke="currentColor" stroke-width="1.8" />
                <path d="M2 7l10 7 10-7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            E-mail
        </button>


    </div>

</body>

<footer class="footer">Desenvolvido por @Ícaro Coelho</footer>

</html>
