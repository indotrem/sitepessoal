<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Ícaro Coelho - Portfólio</title>
</head>

<body>

    <nav class="navbar">

        <div class="logo">Ícaro Coelho</div>

        <ul class="menu">
            <li><a href="index.html">Início</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="portifolio.html">Portfólio</a></li>
            <li><a href="novidades.html">Novidades</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>

        <label class="switch">

            <input type="checkbox" id="toggleMode">
            <span class="slider">

                <i class="bi bi-moon icon moon"></i>
                <i class="bi bi-sun icon sun"></i>

            </span>

        </label>

        <script src="script.js"></script>

    </nav>

    <div class="linha-degrade"></div>

    <div class="video-wrapper">
        <video id="video-small" src="./videos/starbucks.mp4" controls></video>
        <button class="expand-btn" onclick="abrirLightbox()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6ee7b7" stroke-width="2.5">
                <path
                    d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" />
            </svg>
            ampliar
        </button>
    </div>

    <div class="lightbox" id="lightbox" onclick="fecharVideo()">
        <video id="video-full" src="./videos/starbucks.mp4" controls></video>
    </div>

</body>

<footer class="footer">Desenvolvido por @Ícaro Coelho</footer>

</html>
